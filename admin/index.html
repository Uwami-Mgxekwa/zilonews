<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZiloNews Admin | Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root { --primary: #E8001D; --dark: #111418; }
        body { background: #f4f7f6; font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--dark); color: white; padding: 20px; flex-shrink: 0; }
        .main-content { flex-grow: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { font-weight: 700; color: #666; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 40px; color: var(--primary);">ZiloNews <span style="color:white">Admin</span></div>
        <nav>
            <ul style="list-style: none; padding: 0;">
                <li style="margin-bottom: 15px;"><a href="#" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 10px;"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                <li style="margin-bottom: 15px;"><a href="#" style="color: rgba(255,255,255,0.7); text-decoration: none; display: flex; align-items: center; gap: 10px;"><i data-lucide="file-text"></i> Post Story</a></li>
                <li style="margin-bottom: 15px;"><a href="#" style="color: rgba(255,255,255,0.7); text-decoration: none; display: flex; align-items: center; gap: 10px;"><i data-lucide="users"></i> Subscribers</a></li>
                <li style="margin-bottom: 15px;"><a href="#" style="color: rgba(255,255,255,0.7); text-decoration: none; display: flex; align-items: center; gap: 10px;"><i data-lucide="settings"></i> Settings</a></li>
            </ul>
        </nav>
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <label style="font-size: 0.7rem; color: #888;">MASTER KEY (FOR UPLOADS)</label>
            <input type="password" id="admin-master-key" placeholder="Paste Master Key here..." style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; font-size: 0.8rem; margin-top: 5px;">
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Post a New Story</h1>
            <div id="status-msg"></div>
        </header>

        <section class="card">
            <form id="story-form">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="story-title" placeholder="Enter headline..." required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="story-category">
                            <option value="Technology">Technology</option>
                            <option value="Politics">Politics</option>
                            <option value="World">World</option>
                            <option value="Business">Business</option>
                            <option value="Science">Science</option>
                            <option value="Sports">Sports</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Author</label>
                        <input type="text" id="story-author" placeholder="Staff Reporter">
                    </div>
                </div>
                <div class="form-group">
                    <label>Excerpt (Short Summary)</label>
                    <textarea id="story-excerpt" rows="2" placeholder="Brief summary for cards..."></textarea>
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="story-content" rows="10" placeholder="Full article content..."></textarea>
                </div>
                <div class="form-group">
                    <label>Article Image</label>
                    <input type="file" id="story-image-file" accept="image/*">
                    <p style="font-size: 0.75rem; color: #666; margin-top: 5px;">Or provide a URL if you prefer: <input type="text" id="story-image-url" placeholder="https://..." style="width: auto; padding: 4px; border: none; border-bottom: 1px solid #ddd;"></p>
                </div>
                <button type="submit" class="btn"><i data-lucide="send"></i> Publish Story</button>
            </form>
        </section>

        <section class="card">
            <h2>Recent Stories</h2>
            <table id="stories-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="stories-list">
                    <!-- Stories will appear here -->
                </tbody>
            </table>
        </section>
        <section class="card" style="display:none;">
            <h2>Subscribers</h2>
            <div id="subscribers-list">Loading subscribers...</div>
        </section>

        <section class="card" style="display:none;">
            <h2>Settings</h2>
            <form id="settings-form">
                <div class="form-group">
                    <label>Admin Email</label>
                    <input type="email" value="admin@zilonews.com">
                </div>
                <button type="button" class="btn" onclick="alert('Settings saved (Simulated)')">Save Settings</button>
            </form>
        </section>
    </main>

    <script src="../js/api.js"></script>
    <script>
        lucide.createIcons();

        // Tab Switching Logic
        const navLinks = document.querySelectorAll('.sidebar nav a');
        const sections = document.querySelectorAll('main > section');
        
        navLinks.forEach((link, index) => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navLinks.forEach(l => l.style.color = 'rgba(255,255,255,0.7)');
                link.style.color = 'white';
                
                // Simple toggle logic (Dashboard shows everything, others show specific cards)
                if (index === 0) { // Dashboard
                    sections.forEach(s => s.style.display = 'block');
                } else if (index === 1) { // Post
                    sections.forEach(s => s.style.display = 'none');
                    sections[0].style.display = 'block';
                } else if (index === 2) { // Subscribers
                    sections.forEach(s => s.style.display = 'none');
                    sections[2].style.display = 'block';
                } else if (index === 3) { // Settings
                    sections.forEach(s => s.style.display = 'none');
                    sections[3].style.display = 'block';
                }
            });
        });

        // Admin logic
        const form = document.getElementById('story-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const masterKey = document.getElementById('admin-master-key').value.trim();
            
            // Apply Master Key to Parse globally if provided
            if (masterKey) {
                Parse.masterKey = masterKey;
            }

            const originalBtnHtml = btn.innerHTML;
            btn.textContent = 'Publishing...';
            btn.disabled = true;

            const Story = Parse.Object.extend("Story");
            const story = new Story();
            
            story.set("title", document.getElementById('story-title').value);
            story.set("category", document.getElementById('story-category').value);
            story.set("author", document.getElementById('story-author').value);
            story.set("excerpt", document.getElementById('story-excerpt').value);
            story.set("content", document.getElementById('story-content').value);

            // Handle Image (File or URL)
            const fileInput = document.getElementById('story-image-file');
            const urlInput = document.getElementById('story-image-url');

            try {
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const parseFile = new Parse.File(file.name, file);
                    await parseFile.save({ useMasterKey: !!masterKey });
                    story.set("image", parseFile);
                } else if (urlInput.value) {
                    story.set("imageUrl", urlInput.value);
                }

                await story.save(null, { useMasterKey: !!masterKey });
                alert("Story published successfully!");
                form.reset();
                loadStories();
            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
                lucide.createIcons();
            }
        });

        async function deleteStory(id) {
            if (!confirm("Are you sure you want to delete this story?")) return;
            const Story = Parse.Object.extend("Story");
            const query = new Parse.Query(Story);
            try {
                const story = await query.get(id);
                await story.destroy();
                alert("Story deleted.");
                loadStories();
            } catch (e) {
                alert("Error deleting: " + e.message);
            }
        }

        async function loadStories() {
            const Story = Parse.Object.extend("Story");
            const query = new Parse.Query(Story);
            query.descending("createdAt");
            query.limit(20);
            
            try {
                const results = await query.find();
                const list = document.getElementById('stories-list');
                list.innerHTML = '';
                results.forEach(s => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${s.get('title')}</td>
                        <td>${s.get('category')}</td>
                        <td>${s.createdAt.toLocaleDateString()}</td>
                        <td>
                            <button onclick="deleteStory('${s.id}')" style="background:none;border:none;color:var(--primary);cursor:pointer;">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </td>
                    `;
                    list.appendChild(tr);
                });
                lucide.createIcons();
            } catch (e) {
                console.error(e);
            }
        }
        loadStories();
    </script>
</body>
</html>
